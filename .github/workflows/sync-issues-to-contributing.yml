name: Sync Issues to CONTRIBUTING

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: read

concurrency:
  group: sync-contributing-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: |
      contains(join(github.event.issue.labels.*.name, ','), 'registration') ||
      contains(join(github.event.issue.labels.*.name, ','), 'submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run registration script
        if: contains(join(github.event.issue.labels.*.name, ','), 'registration')
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node .github/scripts/signup_extract.js

      - name: Run submission script
        if: contains(join(github.event.issue.labels.*.name, ','), 'submission')
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node .github/scripts/submission_extract.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTING.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync issue #${{ github.event.issue.number }} to CONTRIBUTING"
            git push
          fi
