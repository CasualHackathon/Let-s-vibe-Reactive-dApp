name: Sync Issues to CONTRIBUTING

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: read

concurrency:
  group: sync-contributing-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: |
      contains(join(github.event.issue.labels.*.name, ','), 'registration') ||
      contains(join(github.event.issue.labels.*.name, ','), 'submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync CONTRIBUTING.md
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: python .github/scripts/sync_contributing.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTING.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync issue #${{ github.event.issue.number }} to CONTRIBUTING"
            git push
          fi
